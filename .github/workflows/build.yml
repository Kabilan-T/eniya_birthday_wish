name: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install matplotlib pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --noconsole
          --name "Happy_Birthday_Eniya"
          animate.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Happy_Birthday_Eniya
          path: dist/Happy_Birthday_Eniya.exe
